<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AATS - System Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="display: flex; align-items: center; justify-content: center; background-color: var(--bg-color);">
  <main class="login-container" style="width: 100%;">
    <div class="login-header">
      <h1 class="sys-title" style="font-size: 1.5rem; margin-bottom: 8px;">AATS System Login</h1>
      <p style="color: var(--text-secondary); font-size: 0.875rem;">Enter credentials to access the Room Dashboard.</p>
    </div>
    
    <form id="loginForm" method="post" action="#" novalidate onsubmit="return false;">
      <div class="form-group">
        <label for="username" class="info-label">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password" class="info-label">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
      </div>
      
      <button type="submit" class="btn" style="width: 100%; margin-top: 16px;">Secure Login</button>
      
      <div id="loginError" style="display: none; color: var(--status-critical-text); background: var(--status-critical-bg); padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border-color); font-size: 0.875rem; margin-top: 16px; text-align: center;">
      </div>
    </form>
  </main>

  <script src="script.js?v=20260429"></script>
</body>
</html>
