<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AATS - Select Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="sys-title">AATS Admin Dashboard</a>
    </div>
    <div class="topbar-right">
      <span class="badge status-ok">System Admin</span>
      <button class="btn btn-outline" onclick="localStorage.removeItem('aats_admin_token'); window.location.href='login.html'">Logout</button>
    </div>
  </header>

  <main class="container">
    <div style="margin-bottom: var(--spacing-lg);">
      <h1>Select Lab / Room to Monitor</h1>
      <p style="color: var(--text-secondary); margin-top: var(--spacing-sm);">Choose a location to view connected PCs and asset statuses.</p>
    </div>
    
    <div id="labGrid" class="grid">
      <div class="empty-state">Loading labs...</div>
    </div>
  </main>

  <script src="script.js?v=20260429"></script>
</body>
</html>
